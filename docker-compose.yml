version: '3.8'

services:
  # Host Application (Student App)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: egitim-galaksisi-web
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
      - VITE_MATH_GAMES_URL=http://localhost:5001
      - VITE_LOGIC_GAMES_URL=http://localhost:5002
      - VITE_LANGUAGE_GAMES_URL=http://localhost:5003
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - math-games
      - logic-games
      - language-games
    networks:
      - egitim-galaksisi-network

  # Admin Application
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: egitim-galaksisi-admin
    ports:
      - "5010:5010"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin/node_modules
    networks:
      - egitim-galaksisi-network

  # Teacher Application
  teacher:
    build:
      context: .
      dockerfile: apps/teacher/Dockerfile
    container_name: egitim-galaksisi-teacher
    ports:
      - "5020:5020"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./apps/teacher:/app/apps/teacher
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/teacher/node_modules
    networks:
      - egitim-galaksisi-network

  # Math Games Micro Frontend
  math-games:
    build:
      context: .
      dockerfile: micro-frontends/math-games/Dockerfile
    container_name: egitim-galaksisi-math-games
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./micro-frontends/math-games:/app/micro-frontends/math-games
      - ./packages:/app/packages
      - /app/node_modules
      - /app/micro-frontends/math-games/node_modules
    networks:
      - egitim-galaksisi-network

  # Logic Games Micro Frontend
  logic-games:
    build:
      context: .
      dockerfile: micro-frontends/logic-games/Dockerfile
    container_name: egitim-galaksisi-logic-games
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
    volumes:
      - ./micro-frontends/logic-games:/app/micro-frontends/logic-games
      - ./packages:/app/packages
      - /app/node_modules
      - /app/micro-frontends/logic-games/node_modules
    networks:
      - egitim-galaksisi-network

  # Language Games Micro Frontend
  language-games:
    build:
      context: .
      dockerfile: micro-frontends/language-games/Dockerfile
    container_name: egitim-galaksisi-language-games
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=development
    volumes:
      - ./micro-frontends/language-games:/app/micro-frontends/language-games
      - ./packages:/app/packages
      - /app/node_modules
      - /app/micro-frontends/language-games/node_modules
    networks:
      - egitim-galaksisi-network

networks:
  egitim-galaksisi-network:
    driver: bridge

volumes:
  node_modules:
